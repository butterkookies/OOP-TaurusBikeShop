<style>

    --pk-badge: #2980b9;

    --fk-text: #f0a04b;
    --fk-badge: #d4842a;

    --pkfk-badge: #8e44ad;

    --label-color: #9ca0bf;
    --group-users: #3b82f6;
    --group-catalog: #10b981;
    --group-orders: #f59e0b;
    --group-fulfillment: #8b5cf6;
    --group-support: #ef4444;
    --group-inventory: #06b6d4;
    --shadow: 0 2px 12px rgba(0,0,0,0.3);

  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
    background: var(--bg);
    color: var(--text);
    overflow: auto;
    min-height: 100vh;

  /* ── TOP BAR ── */
  .topbar {
    position: sticky; top: 0; z-index: 100;
    background: rgba(15,17,23,0.92);
    backdrop-filter: blur(12px);
    border-bottom: 1px solid var(--border);
    padding: 14px 24px;
    display: flex; align-items: center; gap: 16px; flex-wrap: wrap;
  }
  .topbar h1 { font-size: 16px; font-weight: 700; color: var(--text-header); white-space: nowrap; }
  .topbar .sep { width: 1px; height: 20px; background: var(--border); }
  .topbar .schema-tag {

  .filter-btn {

    padding: 5px 14px; border-radius: 6px;
    border: 1px solid var(--border); background: transparent;
    color: var(--text-muted); cursor: pointer; transition: all .2s; white-space: nowrap;
  }
  .filter-btn:hover { border-color: var(--border-hover); color: var(--text); }
  .filter-btn.active { background: var(--bg-entity-header); color: var(--text-header); border-color: var(--border-hover); }

  /* ── LEGEND ── */
  .legend {
    position: fixed; bottom: 20px; right: 20px; z-index: 100;
    background: var(--bg-surface); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 16px 20px;
    box-shadow: var(--shadow); font-size: 12px; max-width: 260px;
  }
  .legend h3 { font-size: 10px; text-transform: uppercase; letter-spacing: 1px; color: var(--text-muted); margin-bottom: 8px; }
  .legend-item { display: flex; align-items: center; gap: 8px; margin-bottom: 5px; }
  .legend-swatch { width: 12px; height: 12px; border-radius: 3px; flex-shrink: 0; }
  .legend-line { width: 20px; height: 2px; flex-shrink: 0; }
  .legend-crow { display: flex; align-items: center; gap: 6px; }
  .legend-crow svg { flex-shrink: 0; }

  #erd-canvas { position: relative; padding: 80px 40px 120px; min-height: 100vh; }

  /* ── SVG LAYER ── */
  #erd-lines { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 1; }
  #erd-lines polyline { stroke: var(--line-color); stroke-width: 1.8; fill: none; }
  .card-label { font-family: 'JetBrains Mono', monospace; font-size: 10px; font-weight: 600; fill: var(--label-color); }

  /* ── ENTITY CARD ── */
  .entity {
    position: absolute; background: var(--bg-entity); border: 1px solid var(--border);
    border-radius: var(--radius); box-shadow: var(--shadow);
    min-width: 240px; max-width: 300px; z-index: 10;
    transition: border-color .2s, box-shadow .2s; overflow: hidden;

  .entity-header {
    padding: 8px 12px; font-size: 12px; font-weight: 700; color: var(--text-header);

  .entity-header .dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
  .entity-header .tbl-count { margin-left: auto; font-size: 9px; font-weight: 500; color: var(--text-muted); }
  .entity-attrs { padding: 4px 0; }
  .attr-row {
    display: flex; align-items: center; padding: 2px 12px; font-size: 11px; gap: 5px;

  .attr-row.fk { background: var(--fk-bg); }
  .attr-row.pkfk { background: var(--pkfk-bg); }
  .attr-badge {

  .attr-badge.fk-badge { background: var(--fk-badge); color: #fff; }
  .attr-badge.pkfk-badge { background: var(--pkfk-badge); color: #fff; }
  .attr-name { flex: 1; color: var(--text); font-weight: 500; }
  .attr-row.pk .attr-name { color: var(--pk-text); }
  .attr-row.fk .attr-name { color: var(--fk-text); }
  .attr-row.pkfk .attr-name { color: var(--pkfk-text); }
  .attr-type { color: var(--text-muted); font-size: 10px; font-family: 'JetBrains Mono', monospace; }
  .entity.hidden-entity { display: none; }
</style>

// RENDERING ENGINE
// ═══════════════════════════════════════════════════════════════════════
const canvas = document.getElementById('erd-canvas');
const svgEl = document.getElementById('erd-lines');
const NS = 'http://www.w3.org/2000/svg';
const entityEls = {};

for (const [name, ent] of Object.entries(E)) {
  const div = document.createElement('div');
  div.className = 'entity'; div.id = 'e-' + name; div.dataset.group = ent.group;
  const [x, y] = P[name] || [0, 0];
  div.style.left = x + 'px'; div.style.top = y + 'px';

  const hdr = document.createElement('div');
  hdr.className = 'entity-header';
  const dot = document.createElement('span'); dot.className = 'dot'; dot.style.background = ent.color;
  hdr.appendChild(dot);
  hdr.appendChild(document.createTextNode(name));
  const cnt = document.createElement('span'); cnt.className = 'tbl-count';
  cnt.textContent = ent.attrs.length + ' cols';
  hdr.appendChild(cnt);
  div.appendChild(hdr);

  const ad = document.createElement('div'); ad.className = 'entity-attrs';
  for (const a of ent.attrs) {
    const row = document.createElement('div');
    const isPKFK = a.pk && a.fk;
    row.className = 'attr-row' + (isPKFK ? ' pkfk' : a.pk ? ' pk' : a.fk ? ' fk' : '');
    if (isPKFK) {
      const b = document.createElement('span'); b.className = 'attr-badge pkfk-badge'; b.textContent = 'PK/FK'; row.appendChild(b);
    } else {
      if (a.pk) { const b = document.createElement('span'); b.className = 'attr-badge pk-badge'; b.textContent = 'PK'; row.appendChild(b); }
      if (a.fk) { const b = document.createElement('span'); b.className = 'attr-badge fk-badge'; b.textContent = 'FK'; row.appendChild(b); }
    }
    const ns = document.createElement('span'); ns.className = 'attr-name'; ns.textContent = a.n; row.appendChild(ns);
    const ts = document.createElement('span'); ts.className = 'attr-type'; ts.textContent = a.t; row.appendChild(ts);
    ad.appendChild(row);
  }
  div.appendChild(ad);
  canvas.appendChild(div);
  entityEls[name] = div;
}

// ── CONNECTOR LOGIC ──
let currentView = 'all';

function box(name) {
  const el = entityEls[name]; if (!el) return null;
  const x = parseInt(el.style.left), y = parseInt(el.style.top);
  return { x, y, w: el.offsetWidth, h: el.offsetHeight, cx: x + el.offsetWidth/2, cy: y + el.offsetHeight/2 };
}

function anchor(fromBox, toBox) {
  const dx = toBox.cx - fromBox.cx, dy = toBox.cy - fromBox.cy;
  if (Math.abs(dx) > Math.abs(dy)) {
    return dx > 0
      ? [{ x: fromBox.x+fromBox.w, y: fromBox.cy, s:'r' }, { x: toBox.x, y: toBox.cy, s:'l' }]
      : [{ x: fromBox.x, y: fromBox.cy, s:'l' }, { x: toBox.x+toBox.w, y: toBox.cy, s:'r' }];
  }
  return dy > 0
    ? [{ x: fromBox.cx, y: fromBox.y+fromBox.h, s:'b' }, { x: toBox.cx, y: toBox.y, s:'t' }]
    : [{ x: fromBox.cx, y: fromBox.y, s:'t' }, { x: toBox.cx, y: toBox.y+toBox.h, s:'b' }];
}

function crowsFoot(g, x, y, card, side) {
  const h = (side==='r'||side==='l');
  const d = (side==='r'||side==='b') ? 1 : -1;
  if (card === '1') {
    // Two perpendicular bars = "exactly one"
    if (h) {
      ln(g, x-d*6,y-8, x-d*6,y+8); ln(g, x-d*12,y-8, x-d*12,y+8);
    } else {
      ln(g, x-8,y-d*6, x+8,y-d*6); ln(g, x-8,y-d*12, x+8,y-d*12);
    }
  } else if (card === '0..1') {
    // One bar + circle = "zero or one"
    if (h) {
      ln(g, x-d*6,y-8, x-d*6,y+8);
      circ(g, x-d*16, y, 5);
    } else {
      ln(g, x-8,y-d*6, x+8,y-d*6);
      circ(g, x, y-d*16, 5);
    }
  } else {
    // Trident (crow's foot) = "many"
    if (h) {
      ln(g,x,y, x-d*12,y-9); ln(g,x,y, x-d*12,y); ln(g,x,y, x-d*12,y+9);
      if (card==='0..*') circ(g, x-d*20, y, 5);
    } else {
      ln(g,x,y, x-9,y-d*12); ln(g,x,y, x,y-d*12); ln(g,x,y, x+9,y-d*12);
      if (card==='0..*') circ(g, x, y-d*20, 5);
    }
  }
}

function cardLabel(g, x, y, text, side) {
  const t = document.createElementNS(NS,'text');
  t.setAttribute('class','card-label');
  // Offset the label so it doesn't overlap the line or crow's foot
  const h = (side==='r'||side==='l');
  const d = (side==='r'||side==='b') ? 1 : -1;
  let lx = x, ly = y;
  if (h) {
    lx = x - d * 28;
    ly = y - 10;
  } else {
    lx = x + 12;
    ly = y - d * 28;
  }
  t.setAttribute('x', lx); t.setAttribute('y', ly);
  t.setAttribute('text-anchor', h ? 'middle' : 'start');
  t.setAttribute('dominant-baseline', 'central');
  t.textContent = text;
  g.appendChild(t);
}

function ln(g, x1,y1,x2,y2) {
  const l = document.createElementNS(NS,'line');
  l.setAttribute('x1',x1); l.setAttribute('y1',y1); l.setAttribute('x2',x2); l.setAttribute('y2',y2);
  l.setAttribute('stroke','var(--crow-color)'); l.setAttribute('stroke-width','2');
  g.appendChild(l);
}
function circ(g, cx,cy,r) {
  const c = document.createElementNS(NS,'circle');
  c.setAttribute('cx',cx); c.setAttribute('cy',cy); c.setAttribute('r',r);
  c.setAttribute('fill','var(--bg)'); c.setAttribute('stroke','var(--crow-color)'); c.setAttribute('stroke-width','2');
  g.appendChild(c);
}

function drawLines() {
  svgEl.innerHTML = '';
  const vis = VG[currentView];
  let mx = 0, my = 0;
  for (const n of vis) {
    const el = entityEls[n]; if (!el) continue;
    mx = Math.max(mx, parseInt(el.style.left) + el.offsetWidth + 100);
    my = Math.max(my, parseInt(el.style.top) + el.offsetHeight + 100);
  }
  svgEl.style.width = mx+'px'; svgEl.style.height = my+'px';
  svgEl.setAttribute('viewBox', `0 0 ${mx} ${my}`);
  canvas.style.width = mx+'px'; canvas.style.height = my+'px';

  const used = {};
  for (const r of R) {
    if (!vis.includes(r.f) || !vis.includes(r.t)) continue;
    if (r.f === r.t) { drawSelf(r); continue; }
    const fb = box(r.f), tb = box(r.t);
    if (!fb || !tb) continue;
    const [a1, a2] = anchor(fb, tb);
    const g = document.createElementNS(NS,'g');
    const hz = (a1.s==='r'||a1.s==='l');
    let off = 0;
    const mk = hz ? `v${Math.round((a1.x+a2.x)/2)}` : `h${Math.round((a1.y+a2.y)/2)}`;
    if (used[mk]) off = used[mk]*10;
    used[mk] = (used[mk]||0)+1;

    const poly = document.createElementNS(NS,'polyline');
    if (hz) {
      const mx2 = Math.round((a1.x+a2.x)/2)+off;
      poly.setAttribute('points', `${a1.x},${a1.y} ${mx2},${a1.y} ${mx2},${a2.y} ${a2.x},${a2.y}`);
    } else {
      const my2 = Math.round((a1.y+a2.y)/2)+off;
      poly.setAttribute('points', `${a1.x},${a1.y} ${a1.x},${my2} ${a2.x},${my2} ${a2.x},${a2.y}`);
    }
    g.appendChild(poly);
    crowsFoot(g, a1.x, a1.y, r.fc, a1.s);
    crowsFoot(g, a2.x, a2.y, r.tc, a2.s);
    cardLabel(g, a1.x, a1.y, r.fc, a1.s);
    cardLabel(g, a2.x, a2.y, r.tc, a2.s);
    svgEl.appendChild(g);
  }
}

function drawSelf(r) {
  const b = box(r.f); if (!b) return;
  const g = document.createElementNS(NS,'g');
  const poly = document.createElementNS(NS,'polyline');
  poly.setAttribute('points',
    `${b.x+b.w},${b.cy-15} ${b.x+b.w+30},${b.cy-15} ${b.x+b.w+30},${b.y-15} ${b.cx+15},${b.y-15} ${b.cx+15},${b.y}`);
  poly.setAttribute('stroke','var(--line-color)'); poly.setAttribute('stroke-width','1.5'); poly.setAttribute('fill','none');
  g.appendChild(poly);
  crowsFoot(g, b.cx+15, b.y, r.tc, 't');
  svgEl.appendChild(g);
}

function filterView(key, btn) {
  currentView = key;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  for (const [n, el] of Object.entries(entityEls)) {
    el.classList.toggle('hidden-entity', !VG[key].includes(n));
  }
  requestAnimationFrame(() => drawLines());
}
window.filterView = filterView;
requestAnimationFrame(() => drawLines());
</script>
</body>
</html>
